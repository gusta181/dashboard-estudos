function genId(){return "b"+Date.now()+Math.random().toString(36).slice(2,6)}
function loadLS(k,fb){try{const v=localStorage.getItem(k);return v?JSON.parse(v):fb}catch{return fb}}

}

function BlockForm({initial,onSave,onCancel}){
  const[time,setTime]=useState(initial.time||"08:00");
  const[activity,setActivity]=useState(initial.activity||"");
  const[tag,setTag]=useState(initial.tag||"routine");
  return <div>
    <Inp label="Horário" type="time" value={time} onChange={e=>setTime(e.target.value)}/>
    <Inp label="Atividade" value={activity} onChange={e=>setActivity(e.target.value)} placeholder="Descreva a atividade..."/>
    <Sel label="Categoria" value={tag} onChange={e=>setTag(e.target.value)} options={TO}/>
    <div style={{display:"flex",gap:12,marginTop:20}}>
      <Btn onClick={()=>onSave({time,activity,tag})}>Salvar</Btn>
      <Btn variant="ghost" onClick={onCancel}>Cancelar</Btn>
    </div>
  </div>;
}

function Pomodoro({count,focus,onUpdate}){
  const[time,setTime]=useState(25*60);
  const[running,setRunning]=useState(false);
  const[isBreak,setIsBreak]=useState(false);
  const ref=useRef(null);
  const clear=()=>{if(ref.current)clearInterval(ref.current)};
  useEffect(()=>{
    if(running){
      ref.current=setInterval(()=>{
        setTime(t=>{
          if(t<=1){clear();setRunning(false);
            if(!isBreak){const nc=count+1,nf=focus+25;onUpdate(nc,nf);setIsBreak(true);return nc%4===0?15*60:5*60;}
            else{setIsBreak(false);return 25*60;}
          }return t-1;
        });
      },1000);
    }return clear;
  },[running,isBreak,count,focus]);
  const min=Math.floor(time/60),sec=time%60;
  const disp=String(min).padStart(2,"0")+":"+String(sec).padStart(2,"0");
  const label=isBreak?(count%4===0?"Pausa Longa":"Pausa Curta"):"Foco — Estudo";
  return <div style={{textAlign:"center",padding:"48px 24px"}}>
    <div style={{fontFamily:"'Playfair Display',serif",fontSize:"clamp(64px,15vw,100px)",fontWeight:900,color:C.accent,letterSpacing:-2,lineHeight:1}}>{disp}</div>
    <div style={{fontSize:13,letterSpacing:3,textTransform:"uppercase",color:C.textMuted,marginBottom:32,marginTop:8}}>{label}</div>
    <div style={{display:"flex",gap:12,justifyContent:"center",flexWrap:"wrap"}}>
      <Btn onClick={()=>setRunning(r=>!r)}>{running?"Pausar":time===25*60&&!isBreak?"Iniciar":"Continuar"}</Btn>
      <Btn variant="ghost" onClick={()=>{clear();setRunning(false);setIsBreak(false);setTime(25*60)}}>Resetar</Btn>
      <Btn variant="ghost" onClick={()=>{clear();setRunning(false);if(!isBreak){setIsBreak(true);setTime(5*60)}else{setIsBreak(false);setTime(25*60)}}}>Pular</Btn>
    </div>
    <div style={{display:"flex",gap:40,justifyContent:"center",marginTop:40}}>
      <div style={{textAlign:"center"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:700}}>{count}</div><div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:C.textDim,marginTop:4}}>Pomodoros</div></div>
      <div style={{textAlign:"center"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:36,fontWeight:700}}>{focus}m</div><div style={{fontSize:11,letterSpacing:2,textTransform:"uppercase",color:C.textDim,marginTop:4}}>Tempo Focado</div></div>
    </div>
  </div>;
}

    </div>

    {/* NAV */}
    <div style={{display:"flex",gap:4,padding:"12px 16px",overflowX:"auto",borderBottom:"1px solid "+C.border,background:C.surface}}>
      {navItems.map(n=><button key={n.id} onClick={()=>setPage(n.id)} style={{
        flex:"1 0 auto",padding:"10px 16px",borderRadius:10,border:"none",
        background:page===n.id?C.surface3:"transparent",color:page===n.id?C.accent:C.textMuted,
        fontFamily:"inherit",fontSize:13,fontWeight:600,cursor:"pointer",transition:"all 0.2s",whiteSpace:"nowrap",
        boxShadow:page===n.id?"0 2px 8px rgba(0,0,0,0.3)":"none"
      }}>{n.icon} {n.label}</button>)}
    </div>

    <div style={{maxWidth:900,margin:"0 auto",padding:"24px 16px"}}>

      {/* SCHEDULE */}
      {page==="schedule"&&<div style={{animation:"fadeUp 0.3s ease"}}>
        <div style={{display:"flex",gap:6,marginBottom:20,flexWrap:"wrap",justifyContent:"center"}}>
          {DAYS.map(d=><button key={d} onClick={()=>setSelectedDay(d)} style={{
            padding:"8px 18px",borderRadius:8,border:"1px solid "+(selectedDay===d?C.accent:C.border),
            background:selectedDay===d?C.accent:C.surface,color:selectedDay===d?C.bg:C.textMuted,
            fontFamily:"inherit",fontSize:13,fontWeight:selectedDay===d?700:500,cursor:"pointer",transition:"all 0.2s"
          }}>{DL[d]}</button>)}
        </div>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
          <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700}}>{DL[selectedDay]}</h2>
          <div style={{display:"flex",gap:8}}>
            <Btn onClick={()=>setAddModal(true)} style={{fontSize:13,padding:"8px 16px"}}>+ Adicionar</Btn>
            <Btn variant="ghost" onClick={resetAll} style={{fontSize:12,padding:"8px 12px",border:"1px solid "+C.textDim,color:C.textDim}}>Resetar</Btn>
          </div>
        </div>
        <div style={{display:"flex",flexDirection:"column",gap:6}}>
          {(schedules[selectedDay]||[]).map(block=><div key={block.id} style={{
            padding:"14px 20px",borderRadius:10,background:C.surface,border:"1px solid "+C.border,
            display:"flex",alignItems:"center",gap:12,transition:"all 0.2s",
            borderLeft:block.fixed?"3px solid "+C.textDim:"1px solid "+C.border,flexWrap:"wrap"
          }}>
            <span style={{fontSize:12,fontWeight:700,color:C.accent,letterSpacing:1,minWidth:48}}>{block.time}</span>
            <span style={{flex:1,fontSize:14,fontWeight:500,minWidth:120}}>{block.activity}</span>
            <Tag tag={block.tag}/>
            <button onClick={()=>setEditModal({...block,day:selectedDay})} style={{background:"none",border:"none",color:C.textDim,cursor:"pointer",fontSize:16,padding:"4px 8px"}}>✏️</button>
            <button onClick={()=>deleteBlock(selectedDay,block.id)} style={{background:"none",border:"none",color:"#aa4444",cursor:"pointer",fontSize:16,padding:"4px 8px"}}>🗑</button>
          </div>)}
        </div>
        <Modal open={!!editModal} onClose={()=>setEditModal(null)} title="Editar Bloco">
          {editModal&&<BlockForm initial={editModal} onSave={d=>{updateBlock(editModal.day,editModal.id,d);setEditModal(null);showToast("Atualizado!")}} onCancel={()=>setEditModal(null)}/>}
        </Modal>
        <Modal open={addModal} onClose={()=>setAddModal(false)} title="Novo Bloco">
          <BlockForm initial={{time:"08:00",activity:"",tag:"routine"}} onSave={d=>{addBlock(selectedDay,d);setAddModal(false);showToast("Adicionado!")}} onCancel={()=>setAddModal(false)}/>
        </Modal>
      </div>}

      {/* CHECKLIST */}
      {page==="checklist"&&<div style={{animation:"fadeUp 0.3s ease"}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,marginBottom:20}}>Checklist Diário</h2>
        {CHECKLIST_ITEMS.map(sec=><div key={sec.title} style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,padding:24,marginBottom:16}}>
          <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:16}}>{sec.title}</h3>
          {sec.items.map(item=>{const done=checklist[item.k];return <div key={item.k} onClick={()=>toggleCheck(item.k)} style={{display:"flex",alignItems:"center",gap:12,padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.03)",cursor:"pointer"}}>
            <div style={{width:20,height:20,borderRadius:5,flexShrink:0,border:done?"2px solid "+C.accent:"2px solid "+C.textDim,background:done?C.accent:"transparent",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.2s",fontSize:12,fontWeight:700,color:C.bg}}>{done?"✓":""}</div>
            <span style={{fontSize:14,textDecoration:done?"line-through":"none",color:done?C.textDim:C.text}}>{item.label}{item.tag&&<span style={{marginLeft:8}}><Tag tag={item.tag}/></span>}</span>
          </div>})}
        </div>)}
        <Btn variant="ghost" onClick={()=>{setChecklist({});showToast("Checklist limpo!")}} style={{border:"1px solid "+C.textDim,color:C.textDim,fontSize:13}}>Limpar checklist</Btn>
      </div>}

      {/* POMODORO */}
      {page==="pomodoro"&&<Pomodoro count={pomoCount} focus={pomoFocus} onUpdate={(c,f)=>{setPomoCount(c);setPomoFocus(f)}}/>}

      {/* EXPORT */}
      {page==="export"&&<div style={{animation:"fadeUp 0.3s ease"}}>
        <h2 style={{fontFamily:"'Playfair Display',serif",fontSize:24,fontWeight:700,marginBottom:8}}>Exportar Rotina</h2>
        <p style={{color:C.textMuted,fontSize:14,marginBottom:32}}>Envie sua rotina para o Notion ou salve como backup</p>
        <div style={{display:"grid",gap:16}}>
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,padding:28}}>
            <div style={{fontSize:28,marginBottom:12}}>📋</div>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:8,color:C.accentLight}}>Enviar para o Notion</h3>
            <p style={{color:C.textMuted,fontSize:13,lineHeight:1.6,marginBottom:16}}>Copia em Markdown formatado. Cole no Notion e ele cria tabelas automaticamente!</p>
            <Btn onClick={exportNotion}>📋 Copiar para Notion</Btn>
          </div>
          <div style={{background:C.surface,border:"1px solid "+C.border,borderRadius:14,padding:28}}>
            <div style={{fontSize:28,marginBottom:12}}>💾</div>
            <h3 style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:8,color:C.accentLight}}>Exportar JSON</h3>
            <p style={{color:C.textMuted,fontSize:13,lineHeight:1.6,marginBottom:16}}>Backup completo da rotina em arquivo JSON.</p>
            <Btn variant="ghost" onClick={exportJSON}>💾 Baixar JSON</Btn>
          </div>
        </div>
      </div>}
    </div>

    {/* TOAST */}
    {toast&&<div style={{position:"fixed",bottom:24,left:"50%",transform:"translateX(-50%)",background:C.accent,color:C.bg,padding:"12px 24px",borderRadius:10,fontWeight:600,fontSize:14,zIndex:2000,boxShadow:"0 4px 20px rgba(0,0,0,0.4)",animation:"slideUp 0.3s ease"}}>{toast}</div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
